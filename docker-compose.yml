services:
  postgres:
    image: postgres:16-alpine
    container_name: optica_postgres
    environment:
      POSTGRES_USER: optica
      POSTGRES_PASSWORD: optica123
      POSTGRES_DB: optica_garantias
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata: