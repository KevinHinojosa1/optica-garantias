<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Óptica Los Andes{% endblock %} — Garantías</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            optica: { 50: '#eff6ff', 100: '#dbeafe', 500: '#3b82f6', 600: '#2563eb', 700: '#1d4ed8', 800: '#1e40af' }
          }
        }
      }
    }
  </script>
  <style>
    html { -webkit-text-size-adjust: 100%; }
    .overflow-touch { -webkit-overflow-scrolling: touch; }
    .badge-verde { @apply bg-green-100 text-green-800 border border-green-300; }
    .badge-rojo { @apply bg-red-100 text-red-800 border border-red-300; }
    .badge-amarillo { @apply bg-yellow-100 text-yellow-800 border border-yellow-300; }
  </style>
  {% block head %}{% endblock %}
</head>
<body class="bg-slate-50 min-h-screen">
  <nav class="bg-optica-800 text-white shadow-lg">
    <div class="max-w-7xl mx-auto px-4">
      <div class="flex items-center justify-between gap-3 py-3">
        <div class="flex items-center gap-2 sm:gap-3 min-w-0">
          <span class="text-xl sm:text-2xl shrink-0">👓</span>
          <div class="min-w-0">
            <h1 class="font-bold text-base sm:text-lg leading-tight truncate">Óptica Los Andes</h1>
            <p class="text-xs text-blue-200 truncate">Gestión de Garantías</p>
          </div>
        </div>

        <button type="button" id="nav-toggle" aria-label="Abrir menú" aria-expanded="false"
          class="lg:hidden flex items-center justify-center w-10 h-10 rounded-lg hover:bg-white/10 transition shrink-0">
          <svg id="nav-icon-open" class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/>
          </svg>
          <svg id="nav-icon-close" class="w-6 h-6 hidden" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
          </svg>
        </button>

        <div class="hidden lg:flex gap-1 xl:gap-2 text-sm shrink-0">
          <a href="/importar" class="nav-link px-3 py-2 rounded-lg transition whitespace-nowrap {% if active == 'importar' %}bg-white/20 font-semibold{% else %}hover:bg-white/10{% endif %}">📥 Importar</a>
          <a href="/clientes" class="nav-link px-3 py-2 rounded-lg transition whitespace-nowrap {% if active == 'clientes' %}bg-white/20 font-semibold{% else %}hover:bg-white/10{% endif %}">👥 Atención</a>
          <a href="/historial" class="nav-link px-3 py-2 rounded-lg transition whitespace-nowrap {% if active == 'historial' %}bg-white/20 font-semibold{% else %}hover:bg-white/10{% endif %}">📋 Historial</a>
          <a href="/ivr" class="nav-link px-3 py-2 rounded-lg transition whitespace-nowrap {% if active == 'ivr' %}bg-white/20 font-semibold{% else %}hover:bg-white/10{% endif %}">📞 IVR</a>
          <a href="/scripts" class="nav-link px-3 py-2 rounded-lg transition whitespace-nowrap {% if active == 'scripts' %}bg-white/20 font-semibold{% else %}hover:bg-white/10{% endif %}">💬 Scripts</a>
        </div>
      </div>

      <div id="nav-menu" class="hidden lg:hidden border-t border-white/10 pb-3">
        <div class="grid grid-cols-2 gap-1 pt-3 text-sm">
          <a href="/importar" class="nav-link px-3 py-2.5 rounded-lg transition text-center {% if active == 'importar' %}bg-white/20 font-semibold{% else %}hover:bg-white/10{% endif %}">📥 Importar</a>
          <a href="/clientes" class="nav-link px-3 py-2.5 rounded-lg transition text-center {% if active == 'clientes' %}bg-white/20 font-semibold{% else %}hover:bg-white/10{% endif %}">👥 Atención</a>
          <a href="/historial" class="nav-link px-3 py-2.5 rounded-lg transition text-center {% if active == 'historial' %}bg-white/20 font-semibold{% else %}hover:bg-white/10{% endif %}">📋 Historial</a>
          <a href="/ivr" class="nav-link px-3 py-2.5 rounded-lg transition text-center {% if active == 'ivr' %}bg-white/20 font-semibold{% else %}hover:bg-white/10{% endif %}">📞 IVR</a>
          <a href="/scripts" class="nav-link col-span-2 px-3 py-2.5 rounded-lg transition text-center {% if active == 'scripts' %}bg-white/20 font-semibold{% else %}hover:bg-white/10{% endif %}">💬 Scripts</a>
        </div>
      </div>
    </div>
  </nav>

  <main class="max-w-7xl mx-auto px-3 sm:px-4 py-4 sm:py-6">
    {% block content %}{% endblock %}
  </main>

  <footer class="text-center text-xs text-slate-400 py-4 px-4 border-t mt-6 sm:mt-8">
    Óptica Los Andes Ecuador — Sistema de Garantías v1.1
  </footer>

  <script>
    (function () {
      const toggle = document.getElementById('nav-toggle');
      const menu = document.getElementById('nav-menu');
      const iconOpen = document.getElementById('nav-icon-open');
      const iconClose = document.getElementById('nav-icon-close');
      if (!toggle || !menu) return;

      function setOpen(open) {
        menu.classList.toggle('hidden', !open);
        iconOpen.classList.toggle('hidden', open);
        iconClose.classList.toggle('hidden', !open);
        toggle.setAttribute('aria-expanded', open ? 'true' : 'false');
        toggle.setAttribute('aria-label', open ? 'Cerrar menú' : 'Abrir menú');
      }

      toggle.addEventListener('click', () => setOpen(menu.classList.contains('hidden')));
      menu.querySelectorAll('.nav-link').forEach(link => {
        link.addEventListener('click', () => setOpen(false));
      });
      window.addEventListener('resize', () => {
        if (window.innerWidth >= 1024) setOpen(false);
      });
    })();
  </script>
  {% block scripts %}{% endblock %}
</body>
</html>
