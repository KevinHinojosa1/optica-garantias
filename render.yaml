# Blueprint Render — runtime Python (más estable que Docker en plan free)
services:
  - type: web
    name: optica-garantias
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.0"
      - key: DATABASE_URL
        value: sqlite:///./data/optica_garantias.db
      - key: DEBUG
        value: "false"
      - key: VISION_PROVIDER
        value: claude
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: DEFAULT_ASESOR
        value: Asesor Virtual
      - key: GOOGLE_SPREADSHEET_ID
        sync: false
      - key: GOOGLE_SHEET_IVR_NAME
        value: IVR Verificaciones
      - key: GOOGLE_CREDENTIALS_JSON
        sync: false