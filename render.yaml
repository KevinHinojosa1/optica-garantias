# Blueprint Render — runtime Python (más estable que Docker en plan free)
services:
  - type: web
    name: optica-garantias
    runtime: python
    plan: free
    buildCommand: chmod +x build.sh && ./build.sh
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT --timeout-keep-alive 120
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.0"
      - key: DATABASE_URL
        value: sqlite:///./data/optica_garantias.db
      - key: DEBUG
        value: "false"
      - key: VISION_PROVIDER
        value: claude
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: DEFAULT_ASESOR
        value: "Kevin Hinojosa"
      - key: PIP_NO_CACHE_DIR
        value: "1"
      - key: GOOGLE_SPREADSHEET_ID
        sync: false
      - key: GOOGLE_SHEET_IVR_NAME
        value: IVR Verificaciones
      - key: GOOGLE_CREDENTIALS_JSON
        sync: false
      - key: WHATSAPP_BUSINESS_TOKEN
        sync: false
      - key: WHATSAPP_PHONE_NUMBER_ID
        sync: false
      - key: WHATSAPP_API_VERSION
        value: v21.0
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASSWORD
        sync: false
      - key: SMTP_FROM
        sync: false